kind = "web"
previewPath = "/"
title = "Oman Uniforms Vitrine"
version = "1.0.0"
id = "artifacts/uniforms-vitrine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25595

[services.development]
run = "pnpm --filter @workspace/uniforms-vitrine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uniforms-vitrine", "run", "build" ]
publicDir = "artifacts/uniforms-vitrine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25595"
BASE_PATH = "/"
